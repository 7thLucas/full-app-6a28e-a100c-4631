<style>
  .mode-landscape .sl-layout {

    align-items: center;

    flex-direction: column;

      <div class="sl-content-col flex flex-col justify-center" style="min-width:0;">
        <!-- Category label -->
        <div class="inline-flex items-center mb-6">
          <span class="text-xs font-bold tracking-widest uppercase px-3 py-1 rounded-full"
                style="background:#FFD500; color:#7A4400; border: 1.5px solid #E5B800; letter-spacing:0.18em;">
            Mobile Alarm App
          </span>
        </div>

        <!-- Headline -->
        <h1 class="font-black leading-none mb-4" style="font-size:4.2rem; color:#3B1A00; line-height:1.05; letter-spacing:-0.02em;">
          Wake Up,<br>
          <span style="color:#D97706;">Good Morning!</span>
        </h1>

        <!-- Tagline -->
        <p class="mb-8" style="font-size:1.15rem; color:#7A4400; max-width:36ch; line-height:1.6; font-weight:500;">
          A cheerful, cute alarm experience that makes waking up feel fun — not frightening.
          Your friendly dino companion is always ready to greet the morning with you.

        <div class="flex flex-wrap gap-2 mb-10">
